<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="registryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gatewayGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="kagentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="cardShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="0.5">Solo.io AI Platform</text>
  <text x="480" y="62" text-anchor="middle" fill="#94a3b8" font-size="12">Three products that work independently, but are most powerful together</text>

  <!-- Agent Registry Card -->
  <rect x="40" y="90" width="270" height="340" rx="12" fill="#1e1e3f" stroke="#6366f1" stroke-width="1.5" filter="url(#cardShadow)" opacity="0.95"/>
  <rect x="40" y="90" width="270" height="48" rx="12" fill="url(#registryGrad)"/>
  <rect x="40" y="126" width="270" height="12" fill="url(#registryGrad)"/>
  <text x="175" y="120" text-anchor="middle" fill="white" font-size="15" font-weight="700">Agent Registry</text>

  <text x="175" y="162" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">"What tools exist?"</text>

  <!-- Registry items -->
  <rect x="60" y="180" width="230" height="32" rx="6" fill="#2a2a52" stroke="#4338ca" stroke-width="0.5"/>
  <circle cx="78" cy="196" r="6" fill="#818cf8"/>
  <text x="92" y="200" fill="#e2e8f0" font-size="11">MCP Servers</text>
  <text x="262" y="200" text-anchor="end" fill="#818cf8" font-size="10">184+</text>

  <rect x="60" y="220" width="230" height="32" rx="6" fill="#2a2a52" stroke="#4338ca" stroke-width="0.5"/>
  <circle cx="78" cy="236" r="6" fill="#818cf8"/>
  <text x="92" y="240" fill="#e2e8f0" font-size="11">Agents &amp; Skills</text>

  <rect x="60" y="260" width="230" height="32" rx="6" fill="#2a2a52" stroke="#4338ca" stroke-width="0.5"/>
  <circle cx="78" cy="276" r="6" fill="#818cf8"/>
  <text x="92" y="280" fill="#e2e8f0" font-size="11">Prompts &amp; Templates</text>

  <!-- Registry features -->
  <text x="60" y="316" fill="#94a3b8" font-size="10">Catalog + Discovery</text>
  <text x="60" y="332" fill="#94a3b8" font-size="10">Semantic Search</text>
  <text x="60" y="348" fill="#94a3b8" font-size="10">Versioning + Governance</text>
  <text x="60" y="364" fill="#94a3b8" font-size="10">K8s Deploy (arctl)</text>

  <!-- Registry CLI -->
  <rect x="60" y="380" width="230" height="36" rx="6" fill="#1a1a36" stroke="#4338ca" stroke-width="0.5"/>
  <text x="175" y="403" text-anchor="middle" fill="#818cf8" font-size="10" font-family="monospace">arctl mcp publish / deploy</text>

  <!-- Agent Gateway Card -->
  <rect x="345" y="90" width="270" height="340" rx="12" fill="#1e1e3f" stroke="#06b6d4" stroke-width="1.5" filter="url(#cardShadow)" opacity="0.95"/>
  <rect x="345" y="90" width="270" height="48" rx="12" fill="url(#gatewayGrad)"/>
  <rect x="345" y="126" width="270" height="12" fill="url(#gatewayGrad)"/>
  <text x="480" y="120" text-anchor="middle" fill="white" font-size="15" font-weight="700">Agent Gateway</text>

  <text x="480" y="162" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">"How do I get there safely?"</text>

  <!-- Gateway features -->
  <rect x="365" y="180" width="110" height="32" rx="6" fill="#1a2e3f" stroke="#0e7490" stroke-width="0.5"/>
  <text x="420" y="200" text-anchor="middle" fill="#e2e8f0" font-size="11">Routing</text>

  <rect x="485" y="180" width="110" height="32" rx="6" fill="#1a2e3f" stroke="#0e7490" stroke-width="0.5"/>
  <text x="540" y="200" text-anchor="middle" fill="#e2e8f0" font-size="11">Auth</text>

  <rect x="365" y="220" width="110" height="32" rx="6" fill="#1a2e3f" stroke="#0e7490" stroke-width="0.5"/>
  <text x="420" y="240" text-anchor="middle" fill="#e2e8f0" font-size="11">RBAC</text>

  <rect x="485" y="220" width="110" height="32" rx="6" fill="#1a2e3f" stroke="#0e7490" stroke-width="0.5"/>
  <text x="540" y="240" text-anchor="middle" fill="#e2e8f0" font-size="11">Rate Limiting</text>

  <rect x="365" y="260" width="110" height="32" rx="6" fill="#1a2e3f" stroke="#0e7490" stroke-width="0.5"/>
  <text x="420" y="280" text-anchor="middle" fill="#e2e8f0" font-size="11">Guardrails</text>

  <rect x="485" y="260" width="110" height="32" rx="6" fill="#1a2e3f" stroke="#0e7490" stroke-width="0.5"/>
  <text x="540" y="280" text-anchor="middle" fill="#e2e8f0" font-size="11">Observability</text>

  <!-- Gateway description -->
  <text x="365" y="316" fill="#94a3b8" font-size="10">AI-native reverse proxy</text>
  <text x="365" y="332" fill="#94a3b8" font-size="10">Built on Envoy</text>
  <text x="365" y="348" fill="#94a3b8" font-size="10">Gateway API (K8s native)</text>
  <text x="365" y="364" fill="#94a3b8" font-size="10">OpenTelemetry traces</text>

  <!-- Gateway CRDs -->
  <rect x="365" y="380" width="230" height="36" rx="6" fill="#1a1a36" stroke="#0e7490" stroke-width="0.5"/>
  <text x="480" y="403" text-anchor="middle" fill="#67e8f9" font-size="10" font-family="monospace">Gateway + HTTPRoute + Backend</text>

  <!-- kagent Card -->
  <rect x="650" y="90" width="270" height="340" rx="12" fill="#1e1e3f" stroke="#10b981" stroke-width="1.5" filter="url(#cardShadow)" opacity="0.95"/>
  <rect x="650" y="90" width="270" height="48" rx="12" fill="url(#kagentGrad)"/>
  <rect x="650" y="126" width="270" height="12" fill="url(#kagentGrad)"/>
  <text x="785" y="120" text-anchor="middle" fill="white" font-size="15" font-weight="700">kagent</text>

  <text x="785" y="162" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">"Run the agent"</text>

  <!-- Agent box -->
  <rect x="670" y="180" width="230" height="100" rx="8" fill="#1a3f2e" stroke="#047857" stroke-width="0.5"/>
  <text x="785" y="200" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Agent</text>
  <text x="785" y="218" text-anchor="middle" fill="#a7f3d0" font-size="11">"weather-assistant"</text>

  <rect x="690" y="232" width="90" height="22" rx="4" fill="#064e3b"/>
  <text x="735" y="247" text-anchor="middle" fill="#6ee7b7" font-size="9">ModelConfig</text>

  <rect x="790" y="232" width="90" height="22" rx="4" fill="#064e3b"/>
  <text x="835" y="247" text-anchor="middle" fill="#6ee7b7" font-size="9">MCP Tools</text>

  <rect x="690" y="260" width="190" height="14" rx="3" fill="#064e3b"/>
  <text x="785" y="271" text-anchor="middle" fill="#6ee7b7" font-size="8">Uses tools via Agent Gateway</text>

  <!-- kagent description -->
  <text x="670" y="310" fill="#94a3b8" font-size="10">K8s-native agent lifecycle</text>
  <text x="670" y="326" fill="#94a3b8" font-size="10">Declarative YAML</text>
  <text x="670" y="342" fill="#94a3b8" font-size="10">GitOps-friendly</text>
  <text x="670" y="358" fill="#94a3b8" font-size="10">Solo Enterprise UI chat</text>

  <!-- kagent CRDs -->
  <rect x="670" y="380" width="230" height="36" rx="6" fill="#1a1a36" stroke="#047857" stroke-width="0.5"/>
  <text x="785" y="403" text-anchor="middle" fill="#6ee7b7" font-size="10" font-family="monospace">Agent + RemoteMCPServer</text>

  <!-- Flow arrows -->
  <!-- Registry -> Gateway -->
  <line x1="310" y1="260" x2="345" y2="260" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Gateway -> kagent -->
  <line x1="615" y1="260" x2="650" y2="260" stroke="#06b6d4" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <defs>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#06b6d4"/>
    </marker>
  </defs>

  <!-- Bottom bar -->
  <rect x="40" y="450" width="880" height="50" rx="8" fill="#1a1a36" stroke="#334155" stroke-width="1"/>
  <text x="480" y="470" text-anchor="middle" fill="#94a3b8" font-size="11">
    <tspan font-weight="600" fill="#6366f1">Discover</tspan>
    <tspan fill="#475569"> ──── </tspan>
    <tspan font-weight="600" fill="#06b6d4">Secure</tspan>
    <tspan fill="#475569"> ──── </tspan>
    <tspan font-weight="600" fill="#10b981">Run</tspan>
  </text>
  <text x="480" y="490" text-anchor="middle" fill="#64748b" font-size="10">Each product works independently — most powerful together</text>
</svg>
