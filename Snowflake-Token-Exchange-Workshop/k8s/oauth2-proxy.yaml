apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: kagent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
      - name: oauth2-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
        args:
        - --provider=oidc
        - --provider-display-name=Keycloak
        - --client-id=kagent-ui
        - --client-secret=kagent-ui-secret
        - --redirect-url=http://localhost:8080/oauth2/callback
        - --skip-oidc-discovery=true
        - --oidc-issuer-url=http://localhost:9090/realms/snowflake-workshop
        - --login-url=http://localhost:9090/realms/snowflake-workshop/protocol/openid-connect/auth
        - --redeem-url=http://keycloak.keycloak.svc.cluster.local:8080/realms/snowflake-workshop/protocol/openid-connect/token
        - --oidc-jwks-url=http://keycloak.keycloak.svc.cluster.local:8080/realms/snowflake-workshop/protocol/openid-connect/certs
        - --upstream=http://kagent-ui.kagent.svc.cluster.local:8080
        - --http-address=0.0.0.0:4180
        - --cookie-secret=REPLACE_WITH_RANDOM_32_BYTES
        - --cookie-secure=false
        - --email-domain=*
        - --pass-access-token=true
        - --pass-authorization-header=true
        - --skip-provider-button=true
        - --code-challenge-method=S256
        - --insecure-oidc-allow-unverified-email=true
        ports:
        - containerPort: 4180
        readinessProbe:
          httpGet:
            path: /ping
            port: 4180
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: kagent
spec:
  selector:
    app: oauth2-proxy
  ports:
  - port: 8080
    targetPort: 4180
