apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-default-to-keycloak
  namespace: keycloak
spec:
  from:
  - group: enterpriseagentgateway.solo.io
    kind: EnterpriseAgentgatewayPolicy
    namespace: default
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: default
  to:
  - group: ""
    kind: Service
    name: keycloak
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-default-to-kagent
  namespace: kagent
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: default
  to:
  - group: ""
    kind: Service
    name: ${AGENT_SERVICE_NAME}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: workshop-gateway
  namespace: default
spec:
  gatewayClassName: enterprise-agentgateway
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
---
# Route for kagent UI -> agent pod (JWT auth on inbound — JWKS validation only,
# this path is unchanged from the original workshop).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: workshop-route
  namespace: default
spec:
  parentRefs:
  - name: workshop-gateway
  rules:
  - backendRefs:
    - name: ${AGENT_SERVICE_NAME}
      namespace: ${AGENT_SERVICE_NAMESPACE}
      port: ${AGENT_SERVICE_PORT}
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: workshop-policy
  namespace: default
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: workshop-route
  traffic:
    jwtAuthentication:
      mode: Strict
      providers:
      - issuer: "${KEYCLOAK_ISSUER}"
        audiences:
        - account
        - kagent-ui
        jwks:
          remote:
            backendRef:
              name: keycloak
              kind: Service
              namespace: keycloak
              port: 8080
            jwksPath: "realms/snowflake-workshop/protocol/openid-connect/certs"
---
# AgentgatewayBackend for the MCP server.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: mcp-backend
  namespace: default
spec:
  mcp:
    targets:
    - name: snowflake-mcp
      static:
        host: snowflake-mcp.default.svc.cluster.local
        port: 80
        protocol: StreamableHTTP
        path: /
---
# Route for MCP traffic via AgentgatewayBackend.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-route
  namespace: default
spec:
  parentRefs:
  - name: workshop-gateway
  rules:
  - backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: mcp-backend
    matches:
    - headers:
      - name: x-kagent-host
        value: snowflake-mcp.default.svc.cluster.local
---
# Reference the AuthConfig that does the Keycloak introspection. AGW's CP
# resolves this into the extauth wiring at the proxy — no sidecar code in
# this repo. The previous tokenExchange flow is gone; identity is now
# propagated to the MCP server as the `x-user-id` header set by extauth
# (controlled by `userIdAttributeName` in the AuthConfig).
#
# Note on targetRefs: `traffic.*` policies (including entExtAuth and
# jwtAuthentication) MUST target Gateway/ListenerSet/GRPCRoute/HTTPRoute/
# Service/ServiceEntry — NOT AgentgatewayBackend. The validation rule on
# v2026.5.0-beta.1+ enforces this, so we attach to the HTTPRoute that
# fronts the AgentgatewayBackend.
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayPolicy
metadata:
  name: mcp-introspect-policy
  namespace: default
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: mcp-route
  traffic:
    entExtAuth:
      authConfigRef:
        name: keycloak-introspection
        namespace: agentgateway-system
