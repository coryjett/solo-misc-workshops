apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-sts
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-sts
  template:
    metadata:
      labels:
        app: external-sts
    spec:
      containers:
      - name: sts
        image: python:3.12-slim
        command: ["python", "/app/sts.py"]
        ports:
        - containerPort: 9000
        volumeMounts:
        - name: script
          mountPath: /app
      volumes:
      - name: script
        configMap:
          name: external-sts-script
          items:
          - key: sts.py
            path: sts.py
---
apiVersion: v1
kind: Service
metadata:
  name: external-sts
  namespace: default
spec:
  selector:
    app: external-sts
  ports:
  - port: 9000
    targetPort: 9000
