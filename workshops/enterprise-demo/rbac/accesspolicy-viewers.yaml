apiVersion: ar.dev/v1alpha1
kind: AccessPolicy
metadata:
  name: viewers
spec:
  description: "Read-only access to all artifacts"
  principals:
    - kind: Role
      name: viewers
  rules:
    - actions: ["registry:read"]
      resources:
        - { kind: server, name: "*" }
        - { kind: agent, name: "*" }
