apiVersion: ar.dev/v1alpha1
kind: AccessPolicy
metadata:
  name: admins
spec:
  description: "Full access for platform admins"
  principals:
    - kind: Role
      name: admins
  rules:
    - actions: ["registry:*", "runtime:*"]
      resources:
        - { kind: server, name: "*" }
        - { kind: agent, name: "*" }
