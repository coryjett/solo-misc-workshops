apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
  labels: { app: keycloak }
spec:
  replicas: 1
  selector: { matchLabels: { app: keycloak } }
  template:
    metadata: { labels: { app: keycloak } }
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0
          args: ["start-dev", "--import-realm"]
          env:
            - { name: KC_BOOTSTRAP_ADMIN_USERNAME, value: "admin" }
            - { name: KC_BOOTSTRAP_ADMIN_PASSWORD, value: "admin" }
            - { name: KC_HTTP_ENABLED, value: "true" }
            # Pin issuer to the sslip.io host so the token `iss` claim is identical on
            # the host (browser/arctl via port-forward) and in-cluster (via CoreDNS
            # rewrite). Removes the need for an /etc/hosts alias.
            - { name: KC_HOSTNAME, value: "http://keycloak.127.0.0.1.sslip.io:8080" }
            - { name: KC_HOSTNAME_STRICT, value: "false" }
            - { name: KC_HEALTH_ENABLED, value: "true" }
          ports:
            - { containerPort: 8080, name: http }
          volumeMounts:
            - { name: realm, mountPath: /opt/keycloak/data/import }
          readinessProbe:
            httpGet: { path: /realms/solo-ai-demo, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: realm
          configMap: { name: keycloak-realm }
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
  labels: { app: keycloak }
spec:
  selector: { app: keycloak }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
