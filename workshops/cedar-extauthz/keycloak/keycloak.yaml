# Keycloak IdP for the Cedar ext_authz demo (dev mode, in-memory H2).
# Realm `cedar-demo` is imported from the `keycloak-realm` ConfigMap (created by
# `make keycloak` from keycloak/realm-cedar-demo.json). Modeled on the other
# workshops' Keycloak deployments (e.g. workshops/enterprise-demo/keycloak).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak
  labels: { app: keycloak }
spec:
  replicas: 1
  selector: { matchLabels: { app: keycloak } }
  template:
    metadata: { labels: { app: keycloak } }
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0
          args: ["start-dev", "--import-realm"]
          env:
            - { name: KC_BOOTSTRAP_ADMIN_USERNAME, value: "admin" }
            - { name: KC_BOOTSTRAP_ADMIN_PASSWORD, value: "admin" }
            - { name: KC_HTTP_ENABLED, value: "true" }
            - { name: KC_HOSTNAME_STRICT, value: "false" }
            - { name: KC_HEALTH_ENABLED, value: "true" }
          ports:
            - { containerPort: 8080, name: http }
          volumeMounts:
            - { name: realm, mountPath: /opt/keycloak/data/import }
          readinessProbe:
            httpGet: { path: /realms/cedar-demo, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: realm
          configMap: { name: keycloak-realm }
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak
  labels: { app: keycloak }
spec:
  selector: { app: keycloak }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
